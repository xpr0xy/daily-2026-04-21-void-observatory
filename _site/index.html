<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Observatory</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='none' stroke='%2322aaaa' stroke-width='4'/><circle cx='50' cy='50' r='8' fill='%2322aaaa'/></svg>">
  <style>
    :root {
      --bg: #05050c;
      --bg-panel: #0a0a12;
      --border: #1a1a28;
      --fg: #7a7a8a;
      --fg-bright: #c8c8d8;
      --fg-dim: #444454;
      --teal: #22aaaa;
      --teal-dim: #116666;
      --text-sm: 0.75rem;
      --text-base: 0.875rem;
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    
    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 5, 12, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
      transition: opacity 0.4s cubic-bezier(0.2, 0, 0, 1);
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    #overlay-content {
      text-align: center;
      max-width: 400px;
      padding: var(--space-md);
    }
    #overlay h1 {
      font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--fg-bright);
      letter-spacing: 0.15em;
      margin-bottom: var(--space-md);
    }
    #overlay p {
      color: var(--fg);
      font-size: var(--text-base);
      line-height: 1.6;
      margin-bottom: var(--space-md);
    }
    #overlay .hint {
      color: var(--fg-dim);
      font-size: var(--text-sm);
    }
    
    #start-btn {
      background: transparent;
      border: 1px solid var(--teal);
      color: var(--teal);
      font-family: inherit;
      font-size: var(--text-base);
      padding: 12px 32px;
      border-radius: 4px;
      cursor: pointer;
      min-height: 44px;
      min-width: 140px;
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      touch-action: manipulation;
    }
    #start-btn:hover {
      background: rgba(34, 170, 170, 0.1);
      border-color: var(--teal-dim);
      color: var(--fg-bright);
    }
    #start-btn:active {
      transform: scale(0.97);
    }
    
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: var(--space-sm) var(--space-md);
      background: linear-gradient(to bottom, rgba(5, 5, 12, 0.6), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
      font-size: var(--text-sm);
      color: var(--fg-dim);
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #hud.visible { opacity: 1; }
    #hud-left { display: flex; align-items: center; gap: var(--space-sm); }
    #hud-right { display: flex; align-items: center; gap: var(--space-md); }
    
    .led {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .led-teal { background: var(--teal); box-shadow: 0 0 4px var(--teal); animation: pulse-teal 3s ease-in-out infinite; }
    
    @keyframes pulse-teal {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--teal); }
      50% { opacity: 0.6; box-shadow: 0 0 2px var(--teal); }
    }
    
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #crosshair.visible { opacity: 1; }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: var(--teal);
      opacity: 0.6;
    }
    #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
    #crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }
    
    #info-panel {
      position: fixed;
      bottom: var(--space-md);
      left: var(--space-md);
      font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
      font-size: var(--text-sm);
      color: var(--fg-dim);
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #info-panel.visible { opacity: 1; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" crossorigin src="./assets/index-B3EO30Kc.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="overlay">
    <div id="overlay-content">
      <h1>VOID OBSERVATORY</h1>
      <p>Navigate through geometric voids. Discover hidden monuments in the darkness.</p>
      <button id="start-btn">ENTER</button>
      <p class="hint">WASD to move · Mouse to look · ESC to exit</p>
    </div>
  </div>
  
  <div id="hud">
    <div id="hud-left">
      <span class="led led-teal"></span>
      <span>VOID OBSERVATORY</span>
    </div>
    <div id="hud-right">
      <span id="position-display">0, 0, 0</span>
    </div>
  </div>
  
  <div id="crosshair"></div>
  
  <div id="info-panel">
    <span>ESC to release cursor</span>
  </div>
  

</body>
</html>
